# Runs the app behind Caddy, which terminates HTTPS and reverse-proxies to it.
# Caddy fetches and renews a free Let's Encrypt certificate automatically once
# your domain's DNS points at this server.
services:
  app:
    build: .
    restart: unless-stopped
    expose:
      - "8000" # visible to caddy on the internal network, not the public internet

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data # stores the TLS certificates (must persist)
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
